<div class="min-h-screen flex items-center justify-center bg-slate-900">
  <div class="w-full max-w-md bg-slate-800/80 rounded-2xl shadow-xl p-8 border border-slate-700">
    <h1 class="text-2xl font-semibold text-white mb-6 text-center">Create Databridge Account</h1>

    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm text-slate-300 mb-1">Name</label>
        <input
          type="text"
          [(ngModel)]="form.name"
          name="name"
          class="w-full px-3 py-2 rounded-lg bg-slate-900/70 border border-slate-600 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <div>
        <label class="block text-sm text-slate-300 mb-1">Email</label>
        <input
          type="email"
          [(ngModel)]="form.email"
          name="email"
          class="w-full px-3 py-2 rounded-lg bg-slate-900/70 border border-slate-600 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <div>
        <label class="block text-sm text-slate-300 mb-1">Password</label>
        <input
          type="password"
          [(ngModel)]="form.password"
          name="password"
          class="w-full px-3 py-2 rounded-lg bg-slate-900/70 border border-slate-600 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full py-2 rounded-lg bg-emerald-500 hover:bg-emerald-600 text-white font-medium transition disabled:opacity-60"
      >
        {{ loading ? 'Creating account...' : 'Sign up' }}
      </button>
    </form>

    <p *ngIf="error" class="mt-3 text-sm text-red-400 text-center">
      {{ error }}
    </p>

    <p class="mt-6 text-sm text-slate-400 text-center">
      Already have an account?
      <a routerLink="/login" class="text-indigo-400 hover:text-indigo-300 font-medium">Login</a>
    </p>
  </div>
</div>
